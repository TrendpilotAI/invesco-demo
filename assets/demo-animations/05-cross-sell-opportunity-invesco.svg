      <circle cx="948" cy="630" r="10" fill="#D1FAE5"/>
      <text x="942" y="634" class="text-green" font-size="8" font-weight="600">✓</text>
      <text x="965" y="626" class="text-primary" font-size="11" font-weight="500">Lisa Nakamura</text>
      <text x="965" y="640" class="text-secondary" font-size="9">Merrill · Converted VFIAX→RSP ($1.5M)</text>

      <circle cx="948" cy="670" r="10" fill="#D1FAE5"/>
      <text x="942" y="674" class="text-green" font-size="8" font-weight="600">✓</text>
      <text x="965" y="666" class="text-primary" font-size="11" font-weight="500">David Chen</text>
      <text x="965" y="680" class="text-secondary" font-size="9">MS · Converted FDGRX→QQQ ($3.8M)</text>

      <text x="930" y="720" class="text-secondary" font-size="10">Success rate for this profile:</text>
