    <text x="40" y="205" class="text-primary" font-size="16" font-weight="700">Competitive Displacement Analysis</text>
    <text x="400" y="205" class="text-secondary" font-size="11">Competitor holdings → Invesco alternatives with better performance</text>

    <!-- Column headers -->
