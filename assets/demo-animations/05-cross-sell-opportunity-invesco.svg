      <text x="40" y="588" class="text-primary" font-size="11">"Jennifer, I noticed you have a strong fixed income allocation</text>
      <text x="40" y="604" class="text-primary" font-size="11">with AGG. Our Total Return Bond fund has outperformed by 82bps</text>
      <text x="40" y="620" class="text-primary" font-size="11">YTD — and it's eligible for your advisory platform."</text>

      <text x="40" y="650" class="text-primary" font-size="12" font-weight="600">Key Data Points:</text>
      <text x="40" y="670" class="text-primary" font-size="11">• Your book shows $4.2M in categories where Invesco outperforms</text>
      <text x="40" y="690" class="text-primary" font-size="11">• RSP's equal-weight approach has beaten cap-weighted by 145bps/3Y</text>
      <text x="40" y="710" class="text-primary" font-size="11">• BKLN has 18bps lower expense ratio vs. her current floating rate</text>

      <text x="40" y="740" class="text-primary" font-size="12" font-weight="600">Close:</text>
      <text x="40" y="758" class="text-primary" font-size="11">"Can I send you a comparison sheet for your top 3 holdings?"</text>

