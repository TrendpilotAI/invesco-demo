    <text x="340" y="235" class="text-secondary" font-size="10" font-weight="600">AUM</text>
    <text x="450" y="235" class="text-secondary" font-size="10" font-weight="600">→</text>
    <text x="490" y="235" class="text-secondary" font-size="10" font-weight="600">INVESCO ALTERNATIVE</text>
    <text x="770" y="235" class="text-secondary" font-size="10" font-weight="600">PERF EDGE</text>
