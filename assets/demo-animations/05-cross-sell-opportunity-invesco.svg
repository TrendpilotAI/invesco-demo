      <text x="66" y="279" class="text-secondary" font-size="9" font-weight="700">BLK</text>
      <text x="92" y="274" class="text-primary" font-size="12" font-weight="500">iShares Core US Aggregate Bond</text>
      <text x="92" y="290" class="text-secondary" font-size="9">AGG · Fixed Income Core</text>
