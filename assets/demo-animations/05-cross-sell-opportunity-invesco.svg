    <text x="810" y="660" class="text-primary" font-size="10">$1.8M → $3.2M</text>
    <text x="640" y="680" class="text-secondary" font-size="10">Large Cap</text>
    <text x="810" y="680" class="text-primary" font-size="10">$1.2M → $2.0M</text>
    <text x="640" y="700" class="text-secondary" font-size="10">Growth</text>
    <text x="810" y="700" class="text-primary" font-size="10">$0 → $680K</text>
    <text x="640" y="720" class="text-secondary" font-size="10">Bank Loan</text>
    <text x="810" y="720" class="text-primary" font-size="10">$0 → $340K</text>

    <line x1="640" y1="738" x2="870" y2="738" stroke="#E5E7EB"/>
