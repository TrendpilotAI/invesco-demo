  <text x="160" y="33" class="text-white" font-size="14" opacity="0.5">|</text>
  <text x="178" y="33" class="text-white" font-size="14" opacity="0.8">Cross-Sell Analysis</text>

  <!-- Advisor Hero -->
  <g class="d1">
    <rect x="20" y="68" width="1160" height="90" rx="8" class="card"/>
    <circle cx="70" cy="113" r="28" fill="#EBF5FF"/>
    <text x="58" y="120" class="text-blue" font-size="18" font-weight="700">JP</text>
    <text x="112" y="100" class="text-primary" font-size="20" font-weight="700">Jennifer Park</text>
    <rect x="290" y="86" width="105" height="22" rx="11" fill="#EBF5FF"/>
    <text x="303" y="101" class="text-blue" font-size="10" font-weight="600">💰 Cross-Sell 8.4</text>
    <text x="112" y="120" class="text-secondary" font-size="13">Merrill Lynch Wealth Management · CRD# 5120847</text>
    <text x="112" y="140" class="text-secondary" font-size="12">Northeast Region · New York, NY · Total Book: $24.7M</text>

    <!-- Quick stats -->
    <text x="700" y="100" class="text-secondary" font-size="10">Invesco Share</text>
    <text x="700" y="118" class="text-primary" font-size="16" font-weight="700">12%</text>
    <text x="700" y="133" class="text-secondary" font-size="9">$2.9M of $24.7M</text>

    <text x="830" y="100" class="text-secondary" font-size="10">Takeover Value</text>
    <text x="830" y="118" class="text-green" font-size="16" font-weight="700">$4.2M</text>
    <text x="830" y="133" class="text-secondary" font-size="9">across 4 categories</text>

    <text x="980" y="100" class="text-secondary" font-size="10">Potential Share</text>
    <text x="980" y="118" class="text-blue" font-size="16" font-weight="700">29%</text>
    <text x="980" y="133" class="text-secondary" font-size="9">+17% uplift</text>
