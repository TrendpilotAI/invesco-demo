  <!-- Summary stat -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.0s" fill="freeze"/>
    <rect x="20" y="650" width="1160" height="24" fill="#F0FFF4" rx="4"/>
    <text x="40" y="666" class="text-green" font-size="12" font-weight="600">📊 Total opportunity: +$10.9M combined TTM increase across 5 Rising Star advisors in Southeast</text>
  </g>

  <text x="1140" y="790" class="text-secondary" font-size="9" text-anchor="end" opacity="0.4">Powered by ForwardLane AI · NL→SQL Engine</text>
</svg>