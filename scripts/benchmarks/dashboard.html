<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Benchmark Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; padding: 20px; }
  h1 { text-align: center; margin-bottom: 8px; font-size: 1.8em; color: #fff; }
  .subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 0.9em; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto 30px; }
  .chart-card { background: #1a1d27; border-radius: 12px; padding: 20px; border: 1px solid #2a2d3a; }
  .chart-card h3 { margin-bottom: 12px; font-size: 1em; color: #ccc; }
  canvas { width: 100% !important; }
  table { width: 100%; max-width: 1400px; margin: 0 auto; border-collapse: collapse; background: #1a1d27; border-radius: 12px; overflow: hidden; }
  th { background: #252836; padding: 12px 16px; text-align: left; font-weight: 600; font-size: 0.85em; color: #aaa; border-bottom: 2px solid #2a2d3a; }
  td { padding: 10px 16px; border-bottom: 1px solid #2a2d3a; font-size: 0.85em; }
  tr:hover { background: #1f2233; }
  .status-complete { color: #4ade80; }
  .status-truncated { color: #fbbf24; }
  .status-error { color: #f87171; }
  .score { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 0.8em; }
  .score-high { background: #065f46; color: #6ee7b7; }
  .score-mid { background: #713f12; color: #fde68a; }
  .score-low { background: #7f1d1d; color: #fca5a5; }
  .model-colors { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.85em; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  #loading { text-align: center; padding: 60px; color: #888; }
  h2 { max-width: 1400px; margin: 30px auto 16px; font-size: 1.2em; color: #fff; }
</style>
</head>
<body>
<h1>🏆 Model Benchmark Dashboard</h1>
<p class="subtitle">Comparing LLM performance across tasks</p>
<div class="model-colors" id="legend"></div>
<div id="loading">Loading results.json…</div>
<div class="grid" id="charts" style="display:none"></div>
<h2 id="table-title" style="display:none">📊 Detailed Results</h2>
<table id="results-table" style="display:none">
  <thead>
    <tr>
      <th>Model</th><th>Task</th><th>Time (ms)</th><th>In Tokens</th><th>Out Tokens</th>
      <th>TPS</th><th>Cost ($)</th><th>Chars</th><th>Lines</th><th>Status</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const MODEL_COLORS = {
  'claude-sonnet-4-6': '#8b5cf6',
  'claude-opus-4-6': '#ec4899',
  'gpt-5.4': '#22c55e',
  'deepseek-chat': '#3b82f6',
};

async function load() {
  try {
    const resp = await fetch('results/results.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById('loading').textContent = `Failed to load results.json: ${e.message}`;
  }
}

function render(results) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('charts').style.display = 'grid';
  document.getElementById('table-title').style.display = 'block';
  document.getElementById('results-table').style.display = 'table';

  // Legend
  const legend = document.getElementById('legend');
  for (const [model, color] of Object.entries(MODEL_COLORS)) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${model}`;
    legend.appendChild(item);
  }

  // Group by task
  const tasks = [...new Set(results.map(r => r.task_key))];
  const models = [...new Set(results.map(r => r.model_key))];

  // Charts
  const metrics = [
    { key: 'elapsed_ms', label: 'Response Time (ms)', lower: true },
    { key: 'tokens_per_second', label: 'Tokens/Second (output)', lower: false },
    { key: 'cost_usd', label: 'Cost (USD)', lower: true },
    { key: 'output_tokens', label: 'Output Tokens', lower: false },
  ];

  const chartsDiv = document.getElementById('charts');
  for (const metric of metrics) {
    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `<h3>${metric.label}</h3><canvas id="chart-${metric.key}"></canvas>`;
    chartsDiv.appendChild(card);

    const datasets = models.map(m => ({
      label: m,
      backgroundColor: MODEL_COLORS[m] || '#888',
      data: tasks.map(t => {
        const r = results.find(x => x.model_key === m && x.task_key === t);
        return r ? r[metric.key] : 0;
      }),
    }));

    new Chart(document.getElementById(`chart-${metric.key}`), {
      type: 'bar',
      data: { labels: tasks, datasets },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { color: '#888' }, grid: { color: '#2a2d3a' } },
          x: { ticks: { color: '#888' }, grid: { display: false } },
        },
      },
    });
  }

  // Table
  const tbody = document.getElementById('tbody');
  for (const r of results) {
    const statusClass = `status-${r.status}`;
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${r.model_display}</td>
      <td>${r.task_name}</td>
      <td>${r.elapsed_ms?.toLocaleString() ?? '-'}</td>
      <td>${r.input_tokens?.toLocaleString() ?? '-'}</td>
      <td>${r.output_tokens?.toLocaleString() ?? '-'}</td>
      <td>${r.tokens_per_second?.toFixed(1) ?? '-'}</td>
      <td>$${r.cost_usd?.toFixed(4) ?? '-'}</td>
      <td>${r.content_chars?.toLocaleString() ?? '-'}</td>
      <td>${r.content_lines?.toLocaleString() ?? '-'}</td>
      <td class="${statusClass}">${r.status}</td>
    `;
    tbody.appendChild(row);
  }
}

load();
</script>
</body>
</html>
